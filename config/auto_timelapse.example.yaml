# Timelapse Manager 项目级配置示例。
# 首次执行 `python timelapse.py init` 会生成实际使用的 auto_timelapse.yaml。
schema_version: 1
auto_root: ~/Pictures/AutoTimelapse
capture_interval_seconds: 6
watch_quiet_seconds: 60
disk_space_warning_threshold_gb: 0

morning:
  start_at: '03:00'
  end_at: '09:00'

dusk:
  start_at: '16:00'
  end_at: '20:00'

commands:
  camera: camera-timelapse
  bracketlapse: brackerlapse
  bracketlapse_fallback: bracketlapse

runtime:
  state_dir: .timelapse
  tasks_dir: config/tasks
  poll_interval_seconds: 0.25
  startup_probe_seconds: 2
  stop_timeout_seconds: 10
  retry_delay_seconds: 300

eternal:
  batch_groups: 2000
  images_per_group: 3
  queue_poll_seconds: 2
  archive_retry_seconds: 60
