# Auto Timelapse 配置文件。
#
# 可通过环境变量 AUTO_TIMELAPSE_CONFIG 指定其他配置文件路径。

auto_root: /Users/shw/Pictures/AutoTimelapse
capture_interval_seconds: 6
watch_quiet_seconds: 60

morning:
  start_at: "03:00"
  end_at: "09:00"

# 黄昏时间段需要按季节或拍摄需求设置。
# dusk:
#   start_at: "15:30"
#   end_at: "20:30"
dusk:
  start_at: "15:30"
  end_at: "20:30"
